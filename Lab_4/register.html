<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Create Account</title>
  <link rel="stylesheet" href="register.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
</head>
<body>

  <div class="page-wrapper">

    <!-- Decorative blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Register card -->
    <div class="card">

      <!-- Avatar icon -->
      <div class="icon-circle">
        <i class="bx bxs-user-plus"></i>
      </div>

      <h1 class="card-title">Create Account</h1>
      <p class="card-subtitle">Join us today! Create your account</p>

      <!-- First + Last name row -->
      <div class="form-row">
        <div class="form-group">
          <label for="fname">First Name</label>
          <div class="input-wrapper">
            <i class="bx bx-user input-icon"></i>
            <input type="text" id="fname" placeholder="Enter your first name" autocomplete="off"/>
          </div>
        </div>

        <div class="form-group">
          <label for="lname">Last Name</label>
          <div class="input-wrapper">
            <i class="bx bx-user input-icon"></i>
            <input type="text" id="lname" placeholder="Enter your last name" autocomplete="off"/>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group full">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="bx bx-envelope input-icon"></i>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="off"/>
        </div>
      </div>

      <!-- Password + Confirm row -->
      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="bx bxs-lock-alt input-icon"></i>
            <input type="password" id="password" placeholder="Create a password"/>
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" aria-label="Toggle">
              <i class="bx bx-show"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrapper">
            <i class="bx bxs-lock-alt input-icon"></i>
            <input type="password" id="confirm" placeholder="Confirm your password"/>
            <button type="button" class="toggle-pw" onclick="togglePassword('confirm', this)" aria-label="Toggle">
              <i class="bx bx-show"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Terms checkbox -->
      <div class="terms-row">
        <label class="checkbox-label">
          <input type="checkbox" id="terms"/>
          <span class="checkmark"></span>
          I agree to the
          <a href="#" class="link">Terms &amp; Conditions</a>
          and
          <a href="#" class="link">Privacy Policy</a>
        </label>
      </div>

      <!-- Register button -->
      <button class="btn-primary" type="button">Register</button>

      <!-- Login link -->
      <p class="bottom-text">
        Already have an account? <a href="login.html" class="link">Login here</a>
      </p>

    </div>

  </div>

  <script>
    function togglePassword(fieldId, btn) {
      const input = document.getElementById(fieldId);
      const icon  = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bx-show', 'bx-hide');
      } else {
        input.type = 'password';
        icon.classList.replace('bx-hide', 'bx-show');
      }
    }
  </script>

</body>
</html>
