<!DOCTYPE html>
<html>
<head>
    <title>Grade Calculator</title>
</head>
<body>

    <h2>Grade Calculator</h2>

    <input type="number" id="sub1" placeholder="Subject 1"><br><br>
    <input type="number" id="sub2" placeholder="Subject 2"><br><br>
    <input type="number" id="sub3" placeholder="Subject 3"><br><br>
    <input type="number" id="sub4" placeholder="Subject 4"><br><br>
    <input type="number" id="sub5" placeholder="Subject 5"><br><br>

    <button onclick="calculate()">Calculate</button>

    <h3 id="result"></h3>

    <script>

        function calculate() {

            let s1 = Number(document.getElementById("sub1").value);
            let s2 = Number(document.getElementById("sub2").value);
            let s3 = Number(document.getElementById("sub3").value);
            let s4 = Number(document.getElementById("sub4").value);
            let s5 = Number(document.getElementById("sub5").value);

            let total = s1 + s2 + s3 + s4 + s5;

            let percentage = (total / 500) * 100;

            let grade;

            if (percentage >= 90) {
                grade = "A+";
            }
            else if (percentage >= 80) {
                grade = "A";
            }
            else if (percentage >= 70) {
                grade = "B";
            }
            else if (percentage >= 60) {
                grade = "C";
            }
            else {
                grade = "F";
            }

            document.getElementById("result").innerHTML =
                "Total Marks: " + total +
                "<br>Percentage: " + percentage.toFixed(2) + "%" +
                "<br>Grade: " + grade;
        }

    </script>

</body>
</html>
